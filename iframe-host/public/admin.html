<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>访问审计后台</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f3f6fb;color:#162033;font-family:Arial,sans-serif}.top{height:58px;background:#10192d;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 22px}.main{max-width:1400px;margin:24px auto;padding:0 18px}.panel{background:#fff;border:1px solid #dfe6f1;border-radius:14px;padding:18px;box-shadow:0 10px 30px rgba(28,44,76,.08);margin-bottom:16px}.login{max-width:420px;margin:90px auto}.row{display:flex;gap:12px;flex-wrap:wrap}.field{flex:1;min-width:180px}label{display:block;font-size:13px;color:#64748b;margin-bottom:6px}input{width:100%;padding:11px;border:1px solid #ccd6e5;border-radius:8px}button{border:0;border-radius:8px;padding:10px 14px;cursor:pointer;background:#2563eb;color:#fff}button.danger{background:#dc2626}button.muted{background:#64748b}.hide{display:none}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}.stat{background:#f8fafc;border:1px solid #e5eaf2;border-radius:10px;padding:14px}.stat b{display:block;font-size:24px;margin-top:4px}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;padding:10px;border-bottom:1px solid #edf0f5;white-space:nowrap}th{color:#64748b;background:#f8fafc}.ua{max-width:340px;overflow:hidden;text-overflow:ellipsis}.link{color:#2563eb;cursor:pointer}.modal-mask{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;padding:20px}.modal{background:#fff;border-radius:14px;padding:20px;width:min(720px,100%);max-height:85vh;overflow:auto}.modal pre{white-space:pre-wrap;word-break:break-all;background:#f8fafc;padding:12px;border-radius:8px}.msg{font-size:13px;color:#64748b}
  </style>
</head>
<body>
  <div class="top"><strong>访问审计后台</strong><button id="logout" class="muted hide">退出</button></div>
  <div class="main">
    <section id="login" class="panel login">
      <h2>管理员登录</h2>
      <div class="field"><label>账号</label><input id="username" value="admin"></div><br>
      <div class="field"><label>密码</label><input id="password" type="password"></div><br>
      <button onclick="login()">登录</button> <span id="loginMsg" class="msg"></span>
    </section>
    <section id="app" class="hide">
      <div class="stats">
        <div class="stat">当前显示<b id="total">0</b></div>
        <div class="stat">独立 IP<b id="uniqueIps">0</b></div>
        <div class="stat">移动设备<b id="mobile">0</b></div>
        <div class="stat">桌面设备<b id="desktop">0</b></div>
      </div>
      <div class="panel" style="margin-top:16px">
        <div class="row" style="align-items:end">
          <div class="field"><label>显示条数</label><input id="limit" type="number" value="500" min="1" max="5000"></div>
          <button onclick="loadAccess()">刷新</button>
          <button class="danger" onclick="clearAccess()">清空日志</button>
        </div>
      </div>
      <div class="panel table-wrap">
        <table><thead><tr><th>时间</th><th>IP</th><th>设备</th><th>系统</th><th>浏览器</th><th>来源</th><th>User-Agent</th></tr></thead><tbody id="rows"></tbody></table>
      </div>
    </section>
  </div>
  <div id="modalMask" class="modal-mask hide" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>访问详情</h3><pre id="detail"></pre><button onclick="closeModal()">关闭</button></div></div>
  <script>
    let token=sessionStorage.getItem('accessAdminToken')||'';
    const el=id=>document.getElementById(id);
    const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    async function request(url,options={}){options.headers={...(options.headers||{}),'Content-Type':'application/json',Authorization:'Bearer '+token};const r=await fetch(url,options);const d=await r.json();if(r.status===401){logout();throw new Error('登录已失效')}if(!r.ok)throw new Error(d.message||'请求失败');return d}
    async function login(){el('loginMsg').textContent='';try{const r=await fetch('/admin/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:el('username').value,password:el('password').value})});const d=await r.json();if(!r.ok)throw new Error(d.message||'登录失败');token=d.token;sessionStorage.setItem('accessAdminToken',token);showApp()}catch(e){el('loginMsg').textContent=e.message}}
    function logout(){token='';sessionStorage.removeItem('accessAdminToken');el('app').classList.add('hide');el('logout').classList.add('hide');el('login').classList.remove('hide')}
    function showApp(){el('login').classList.add('hide');el('app').classList.remove('hide');el('logout').classList.remove('hide');loadAccess()}
    async function loadAccess(){try{const d=await request('/admin/api/access?limit='+encodeURIComponent(el('limit').value));el('total').textContent=d.total;el('uniqueIps').textContent=d.unique_ips;el('mobile').textContent=d.records.filter(x=>x.device==='Mobile'||x.device==='Tablet').length;el('desktop').textContent=d.records.filter(x=>x.device==='Desktop').length;el('rows').innerHTML=d.records.map((x,i)=>`<tr><td>${esc(new Date(x.time).toLocaleString())}</td><td>${esc(x.ip)}</td><td>${esc(x.device)}</td><td>${esc(x.os)}</td><td>${esc(x.browser)}</td><td title="${esc(x.referrer)}">${esc(x.referrer||'-')}</td><td class="ua"><span class="link" onclick='showDetail(${JSON.stringify(JSON.stringify(x))})'>${esc(x.user_agent||'-')}</span></td></tr>`).join('')||'<tr><td colspan="7">暂无记录</td></tr>'}catch(e){alert(e.message)}}
    async function clearAccess(){if(!confirm('确定清空全部访问日志？'))return;try{await request('/admin/api/access',{method:'DELETE',body:JSON.stringify({confirm:'CLEAR'})});loadAccess()}catch(e){alert(e.message)}}
    function showDetail(raw){el('detail').textContent=JSON.stringify(JSON.parse(raw),null,2);el('modalMask').classList.remove('hide')}
    function closeModal(){el('modalMask').classList.add('hide')}
    el('logout').onclick=logout;if(token)showApp();
  </script>
</body>
</html>
